---
- name: Backup running configurations from all devices
  hosts: all
  gather_facts: false

  vars:
    backup_dir: "{{ playbook_dir }}/../../configs/{{ inventory_hostname }}"
    timestamp: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"

  tasks:
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Fetch running configuration
      cisco.ios.ios_command:
        commands: "show running-config"
      register: running_config

    - name: Save config to timestamped file
      ansible.builtin.copy:
        content: "{{ running_config.stdout[0] }}"
        dest: "{{ backup_dir }}/running-config-{{ timestamp }}.txt"
      delegate_to: localhost

    - name: Save latest config (no timestamp — for diffs)
      ansible.builtin.copy:
        content: "{{ running_config.stdout[0] }}"
        dest: "{{ backup_dir }}/running-config-latest.txt"
      delegate_to: localhost

    - name: Report backup location
      ansible.builtin.debug:
        msg: "Config saved to {{ backup_dir }}/running-config-{{ timestamp }}.txt"
