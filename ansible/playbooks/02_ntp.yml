---
- name: Configure NTP on all devices
  hosts: all
  gather_facts: false

  tasks:
    - name: Set NTP server
      cisco.ios.ios_config:
        lines:
          - "ntp server {{ ntp_server }} prefer"
          - "clock timezone UTC 0 0"
          - "service timestamps log datetime msec"
          - "service timestamps debug datetime msec"

    - name: Verify NTP synchronization
      cisco.ios.ios_command:
        commands: "show ntp status"
      register: ntp_status

    - name: Assert NTP is synchronized
      ansible.builtin.assert:
        that:
          - "'synchronized' in ntp_status.stdout[0]"
        fail_msg: "NTP not synchronized on {{ inventory_hostname }} — check connectivity to {{ ntp_server }}"
        success_msg: "NTP synchronized on {{ inventory_hostname }}"
      ignore_errors: true   # device may need time to sync on first run
