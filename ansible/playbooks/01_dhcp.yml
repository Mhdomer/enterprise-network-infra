---
- name: Configure DHCP pools on HQ router
  hosts: hq-router
  gather_facts: false

  tasks:
    - name: Exclude management IPs from DHCP
      cisco.ios.ios_config:
        lines:
          - "ip dhcp excluded-address 10.0.10.1 10.0.10.10"
          - "ip dhcp excluded-address 10.0.20.1 10.0.20.10"
          - "ip dhcp excluded-address 10.0.30.1 10.0.30.10"

    - name: Configure DHCP pools
      cisco.ios.ios_config:
        parents: "ip dhcp pool {{ item.name }}"
        lines:
          - "network {{ item.network }} {{ item.mask }}"
          - "default-router {{ item.default_router }}"
          - "dns-server {{ item.dns_server }}"
          - "lease 1"
      loop: "{{ dhcp_pools }}"

    - name: Verify DHCP pools exist
      cisco.ios.ios_command:
        commands: "show ip dhcp pool"
      register: dhcp_output

    - name: Print DHCP pool status
      ansible.builtin.debug:
        var: dhcp_output.stdout_lines
