---
# Variables specific to routers
nat_acl_name: NAT_ACL
nat_inside_int: GigabitEthernet0/2
nat_outside_int: GigabitEthernet0/0

dhcp_excluded_start: "10.0.0.1"
dhcp_excluded_end: "10.0.0.10"

dhcp_pools:
  - name: VLAN10_MGMT_HQ
    network: 10.0.10.0
    mask: 255.255.255.192
    default_router: 10.0.10.1
    dns_server: 10.0.40.10
  - name: VLAN20_USERS_HQ
    network: 10.0.20.0
    mask: 255.255.255.128
    default_router: 10.0.20.1
    dns_server: 10.0.40.10
  - name: VLAN30_VOICE_HQ
    network: 10.0.30.0
    mask: 255.255.255.192
    default_router: 10.0.30.1
    dns_server: 10.0.40.10
